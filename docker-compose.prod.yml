version: "3.9"

# Production-ready configuration.
# Ensure sensitive values are externalized via .env or secrets.

services:
  blockchain:
    build:
      context: ./blockchain
      dockerfile: ../Dockerfile.blockchain
    restart: always
    volumes:
      - chain_shared:/shared
    ports:
      - "8545:8545"
    networks:
      - app-net

  explorer:
    build:
      context: ./explorer
      dockerfile: ../Dockerfile.explorer
    restart: always
    depends_on:
      - blockchain
    environment:
      - EXPLORER_RPC_URL=${EXPLORER_RPC_URL:-http://blockchain:8545}
      - EXPLORER_CHAIN_ID=${CHAIN_ID:-31337}
      - EXPLORER_CHAIN_NAME=${EXPLORER_CHAIN_NAME:-Hardhat Local}
      - EXPLORER_HOST=0.0.0.0
      - EXPLORER_PORT=4000
    ports:
      - "4000:4000"
    networks:
      - app-net

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-file_registry}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-file_registry}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Security: Limit resource usage
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio_data:/data
    networks:
      - app-net
    # Security: Limit resource usage
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      - PYTHONPATH=/app
      - SECRET_KEY=${SECRET_KEY:-CHANGE_ME_SECRET}
      - POSTGRES_SERVER=${POSTGRES_SERVER:-db}
      - POSTGRES_USER=${POSTGRES_USER:-app}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}
      - POSTGRES_DB=${POSTGRES_DB:-file_registry}
      - FILE_STORAGE_BACKEND=${FILE_STORAGE_BACKEND:-minio}
      - FILE_STORAGE_PATH=/data/files
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minio}}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minio123}}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-documents}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - WEB3_PROVIDER_URL=${WEB3_PROVIDER_URL:-}
      - CONTRACT_ADDRESS_FILE=/shared/contract_address.txt
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS:-}
      - CONTRACT_OWNER_PRIVATE_KEY=${CONTRACT_OWNER_PRIVATE_KEY:-}
      - CONTRACT_OWNER_ADDRESS=${CONTRACT_OWNER_ADDRESS:-}
      - CHAIN_ID=${CHAIN_ID:-31337}
      - BLOCK_EXPLORER_URL=${BLOCK_EXPLORER_URL:-http://localhost:4000}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["http://localhost:5173"]}
    
    volumes:
      - backend_files:/data/files
      - chain_shared:/shared
    ports:
      - "8000:8000"
    networks:
      - app-net
    # Health check for backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Security: Limit resource usage
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    restart: always
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000/api}
      - VITE_BLOCK_EXPLORER_URL=${VITE_BLOCK_EXPLORER_URL:-http://localhost:4000}
    ports:
      - "3000:80"
    networks:
      - app-net
    # Security: Limit resource usage
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  db_data:
  backend_files:
  minio_data:
  chain_shared:

networks:
  app-net:
    driver: bridge

