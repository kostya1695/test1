services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: file_registry
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d file_registry"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - app-net

  blockchain:
    build:
      context: ./blockchain
      dockerfile: ../Dockerfile.blockchain
    volumes:
      - chain_shared:/shared
    ports:
      - "8545:8545"
    networks:
      - app-net

  explorer:
    build:
      context: ./explorer
      dockerfile: ../Dockerfile.explorer
    depends_on:
      - blockchain
    environment:
      - EXPLORER_RPC_URL=http://blockchain:8545
      - EXPLORER_CHAIN_ID=31337
      - EXPLORER_CHAIN_NAME=Hardhat Local
      - EXPLORER_HOST=0.0.0.0
      - EXPLORER_PORT=4000
    ports:
      - "4000:4000"
    networks:
      - app-net

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      - PYTHONPATH=/app
      - SECRET_KEY=CHANGE_ME_SECRET
      - POSTGRES_SERVER=db
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=file_registry
      - FILE_STORAGE_BACKEND=minio
      - FILE_STORAGE_PATH=/data/files
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=minio123
      - MINIO_BUCKET_NAME=documents
      - MINIO_SECURE=false
      - WEB3_PROVIDER_URL=http://blockchain:8545
      - CONTRACT_ADDRESS=
      # Hardhat default account #0 (ONLY for local dev/demo)
      - CONTRACT_OWNER_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - CONTRACT_OWNER_ADDRESS=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
      - CHAIN_ID=31337
      - BLOCK_EXPLORER_URL=http://localhost:4000
      - BACKEND_CORS_ORIGINS=["http://localhost:5173"]
    
    volumes:
      - backend_files:/data/files
      - chain_shared:/shared
    ports:
      - "8000:8000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
      - VITE_BLOCK_EXPLORER_URL=http://localhost:4000
    ports:
      - "5173:5173"
    networks:
      - app-net

volumes:
  db_data:
  backend_files:
  minio_data:
  chain_shared:

networks:
  app-net:
